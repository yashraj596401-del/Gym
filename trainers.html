<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Correct Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Trainers - Gym Nexa</title>
</head>

<body class="bg-black text-white">

    <!-- Navbar -->
    <nav class="flex flex-col md:flex-row justify-between items-center px-6 md:px-10 py-6 gap-4">
        <div class="text-3xl font-black">
            GYM <span class="text-yellow-500">NEXA</span>
        </div>

        <ul class="flex flex-wrap justify-center gap-6 font-bold">
            <li><a href="index.html" class="hover:text-yellow-500 transition">Home</a></li>
            <li><a href="programs.html" class="hover:text-yellow-500 transition">Programs</a></li>
            <li><a href="membership.html" class="hover:text-yellow-500 transition">Membership</a></li>
            <li><a href="trainers.html" class="text-yellow-500">Trainers</a></li>
        </ul>
    </nav>

    <!-- Trainers -->
    <section class="py-20 px-6 md:px-10 text-center">

        <h2 class="text-4xl md:text-5xl font-black uppercase italic mb-16">
            The <span class="text-yellow-500">Iron</span> Mentors
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 max-w-6xl mx-auto">

            <!-- Trainer 1 -->
            <div class="relative group h-[400px] md:h-[500px] flex items-center justify-center">

                <!-- Back -->
                <div class="absolute inset-0 rounded-3xl overflow-hidden border border-zinc-800 bg-zinc-900 -rotate-6 translate-y-2 opacity-60 transition-all duration-500 group-hover:-translate-x-10 group-hover:-rotate-12">
                    <img
                        src="https://drive.google.com/uc?export=view&id=1AT-VQoKWbOlED3xwmgmXCCxWAnftsOlj"
                        loading="lazy"
                        class="w-full h-full object-cover"
                        alt="Trainer">
                </div>

                <!-- Middle -->
                <div class="absolute inset-0 rounded-3xl overflow-hidden border border-zinc-700 bg-zinc-900 rotate-3 -translate-y-2 opacity-80 transition-all duration-500 group-hover:translate-x-10 group-hover:rotate-12">
                    <img
                        src="https://drive.google.com/uc?export=view&id=1FfvhCMuS5Fiw2xlV0MqGlk6hy2aXWRgg"
                        loading="lazy"
                        class="w-full h-full object-cover"
                        alt="Trainer">
                </div>

                <!-- Front -->
                <div class="absolute inset-0 rounded-3xl overflow-hidden border border-zinc-600 bg-zinc-900 shadow-2xl z-10 transition-all duration-500 group-hover:-translate-y-4 group-hover:scale-95">

                    <img
                        src="https://drive.google.com/uc?export=view&id=1dC3kACi1RLskaFQRt8zg9Jp9dlCitgD3"
                        loading="lazy"
                        class="w-full h-full object-cover"
                        alt="Tejasvi Nexa">

                    <div class="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-black via-black/80 to-transparent">
                        <h3 class="text-3xl font-bold">Tejasvi Nexa</h3>
                        <p class="text-yellow-500 font-bold">Head Coach / Pro Bodybuilder</p>
                    </div>

                </div>

            </div>

            <!-- Trainer 2 -->
            <div class="relative group overflow-hidden rounded-3xl border border-zinc-800 h-[400px] md:h-[500px]">

                <img
                    src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=900&q=80"
                    loading="lazy"
                    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                    alt="Sarah Fit">

                <div class="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-black via-black/70 to-transparent">
                    <h3 class="text-3xl font-bold">Sarah Fit</h3>
                    <p class="text-yellow-500 font-bold">Weight Loss Expert</p>
                </div>

            </div>

        </div>

    </section>

</body>
</html>
