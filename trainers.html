<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://tailwindcss.com"></script>
    <title>Trainers - Gym Nexa</title>
</head>
<body class="bg-black text-white">
    <!-- Navbar -->
    <nav class="flex justify-between items-center px-10 py-6">
        <div class="text-3xl font-black">GYM <span style="color:#D4AF37">NEXA</span></div>
        <ul class="flex space-x-8 font-bold">
            <li><a href="index.html" class="hover:text-amber-500 transition">Home</a></li>
            <li><a href="programs.html" class="hover:text-amber-500 transition">Programs</a></li>
            <li><a href="membership.html" class="hover:text-amber-500 transition">Membership</a></li>
            <li><a href="trainers.html" style="color:#D4AF37">Trainers</a></li>
        </ul>
    </nav>

    <!-- Trainers Section -->
    <section class="py-20 px-10 text-center">
        <h2 class="text-5xl font-black mb-16 uppercase italic">The <span style="color:#D4AF37">Iron</span> Mentors</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 max-w-5xl mx-auto items-center">
            
            <!-- Trainer 1: Rocky Nexa (Image Stack Effect) -->
            <div class="relative group h-[500px] w-full flex items-center justify-center">
                
                <!-- 3rd Image (Sabse Piche) -->
                <div class="absolute inset-0 rounded-3xl overflow-hidden border-2 border-zinc-800 bg-zinc-900 transform -rotate-6 translate-y-2 opacity-60 transition duration-500 group-hover:-translate-x-12 group-hover:-rotate-12 group-hover:opacity-80">
                    <img src="https://lh3.googleusercontent.com/d/1AT-VQoKWbOlED3xwmgmXCCxWAnftsOlj" class="w-full h-full object-cover" alt="Rocky Pose 3">
                </div>

                <!-- 2nd Image (Beech Wali) -->
                <div class="absolute inset-0 rounded-3xl overflow-hidden border-2 border-zinc-700 bg-zinc-900 transform rotate-3 -translate-y-2 opacity-80 transition duration-500 group-hover:translate-x-12 group-hover:rotate-12 group-hover:opacity-90">
                    <img src="https://lh3.googleusercontent.com/d/1FfvhCMuS5Fiw2xlV0MqGlk6hy2aXWRgg" class="w-full h-full object-cover" alt="Rocky Pose 2">
                </div>

                <!-- 1st Image (Sabse Aage Main Image) -->
                <div class="absolute inset-0 rounded-3xl overflow-hidden border-2 border-zinc-600 bg-zinc-900 transform transition duration-500 group-hover:-translate-y-4 group-hover:scale-95 z-10 shadow-2xl">
                    <img src="https://lh3.googleusercontent.com/d/1dC3kACi1RLskaFQRt8zg9Jp9dlCitgD3" class="w-full h-full object-cover" alt="Tejaswi Main">
                    <!-- Text Overlay -->
                    <div class="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-black via-black/80 to-transparent">
                        <h3 class="text-3xl font-bold">Rocky Nexa</h3>
                        <p class="text-yellow-500 font-bold">Head Coach / Pro Bodybuilder</p>
                    </div>
                </div>

            </div>

            <!-- Trainer 2: Sarah Fit -->
            <div class="relative group overflow-hidden rounded-3xl border-2 border-zinc-800 h-[500px]">
                <img src="https://unsplash.com" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt="Sarah Fit">
                <div class="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-black via-black/70 to-transparent z-10">
                    <h3 class="text-3xl font-bold">Sarah Fit</h3>
                    <p class="text-yellow-500 font-bold">Weight Loss Expert</p>
                </div>
            </div>

        </div>
    </section>
</body>
</html>
