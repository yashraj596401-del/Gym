<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Nexa | Trainers</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}

/* Card */
.stack{
    position:relative;
    width:380px;
    height:520px;
    margin:auto;
}

.photo{
    position:absolute;
    inset:0;
    border-radius:24px;
    overflow:hidden;
    cursor:pointer;
    transition:.6s;
    box-shadow:0 20px 40px rgba(0,0,0,.6);
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Default Stack */
.back{
    transform:rotate(-8deg);
    z-index:1;
    opacity:.6;
}

.middle{
    transform:rotate(8deg);
    z-index:2;
    opacity:.85;
}

.front{
    z-index:3;
}

/* Fan Out */
.stack:hover .back{
    transform:translate(-180px,-20px) rotate(-18deg) scale(.95);
    opacity:1;
    z-index:30;
}

.stack:hover .middle{
    transform:translate(180px,-20px) rotate(18deg) scale(.95);
    opacity:1;
    z-index:31;
}

.stack:hover .front{
    transform:translateY(60px) scale(.90);
    z-index:32;
}

.info{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:30px;
    background:linear-gradient(transparent,rgba(0,0,0,.95));
}

.info h3{
    font-size:30px;
    font-weight:bold;
}

.info p{
    color:#D4AF37;
    font-weight:bold;
}

/* Lightbox */
#lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:20px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    cursor:pointer;
}

@media(max-width:768px){

.stack{
    width:300px;
    height:420px;
}

.stack:hover .back{
    transform:translateX(-70px) rotate(-15deg);
}

.stack:hover .middle{
    transform:translateX(70px) rotate(15deg);
}

}
</style>

</head>

<body>

<!-- Navbar -->

<nav class="flex justify-between items-center px-8 py-6">

<div class="text-3xl font-black">
GYM <span class="text-yellow-500">NEXA</span>
</div>

<ul class="flex gap-8 font-bold">
<li><a href="index.html">Home</a></li>
<li><a href="programs.html">Programs</a></li>
<li><a href="membership.html">Membership</a></li>
<li class="text-yellow-500">Trainers</li>
</ul>

</nav>

<section class="py-16">

<h1 class="text-center text-5xl font-black mb-16 uppercase">
The <span class="text-yellow-500">Iron</span> Mentors
</h1>

<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-20 items-center">

<!-- Trainer 1 -->

<div class="stack">

<a class="photo back"
onclick="openImage('images/a.jpg')">

<img src="images/a.jpg">

</a>

<a class="photo middle"
onclick="openImage('images/b.jpg')">

<img src="images/b.jpg">

</a>

<a class="photo front"
onclick="openImage('images/c.jpg')">

<img src="images/c.jpg">

<div class="info">

<h3>Tejasvi Nexa</h3>

<p>Head Coach • Pro Bodybuilder</p>

</div>

</a>
            </div>

            <!-- Trainer 2 -->

            <div class="relative group overflow-hidden rounded-3xl h-[520px] shadow-2xl">

                <img src="images/sarah.jpg"
                     class="w-full h-full object-cover transition duration-500 group-hover:scale-110"
                     alt="Sarah Fit">

                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>

                <div class="absolute bottom-8 left-8">
                    <h2 class="text-4xl font-black">Sarah Fit</h2>
                    <p class="text-yellow-500 font-bold text-lg">
                        Weight Loss Expert
                    </p>
                </div>

            </div>

        </div>

    </section>

    <!-- Lightbox -->

    <div id="lightbox"
         class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[9999]">

        <span onclick="closeImage()"
              class="absolute top-5 right-8 text-5xl cursor-pointer text-white">
            &times;
        </span>

        <img id="lightboxImg"
             src=""
             class="max-w-[90%] max-h-[90%] rounded-2xl shadow-2xl">

    </div>
    <script>
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");

    function openImage(src) {
        lightboxImg.src = src;
        lightbox.classList.remove("hidden");
        lightbox.classList.add("flex");
        document.body.style.overflow = "hidden";
    }

    function closeImage() {
        lightbox.classList.remove("flex");
        lightbox.classList.add("hidden");
        lightboxImg.src = "";
        document.body.style.overflow = "auto";
    }

    // Click outside image to close
    lightbox.addEventListener("click", function (e) {
        if (e.target === lightbox) {
            closeImage();
        }
    });

    // ESC key to close
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
            closeImage();
        }
    });
</script>

</body>
</html>
